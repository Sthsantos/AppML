<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="strongGlow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
            <feOffset dx="0" dy="0" result="offsetblur"/>
            <feFlood flood-color="#ffd700" flood-opacity="0.9"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGradient)" rx="100"/>
    
    <!-- Decorative circles -->
    <circle cx="100" cy="100" r="60" fill="#667eea" opacity="0.08"/>
    <circle cx="412" cy="412" r="80" fill="#764ba2" opacity="0.08"/>
    
    <!-- Clave de Sol - Path SVG profissional baseado em fontes musicais -->
    <g transform="translate(256, 256) scale(1.4)" filter="url(#strongGlow)">
        <!-- Treble Clef - Caminho baseado na fonte musical Bravura -->
        <path d="M 8.4,-120 C 18,-120 25,-113 25,-103 C 25,-93 18,-86 8.4,-86 C -1.2,-86 -8.4,-93 -8.4,-103 C -8.4,-113 -1.2,-120 8.4,-120 Z
                 M 0,-82 L 0,110 C 0,120 -5,128 -14,132 C -23,136 -33,134 -40,127 C -47,120 -49,109 -45,99 C -41,89 -32,82 -21,80 L -21,76 C -35,78 -47,88 -51,101 C -55,114 -51,128 -42,138 C -33,148 -19,152 -7,147 C 5,142 14,130 14,116 L 14,-70 C 27,-67 38,-57 43,-44 C 48,-31 46,-16 38,-5 C 30,6 17,13 3,13 C -11,13 -23,6 -30,-5 C -37,-16 -39,-30 -34,-43 C -29,-56 -18,-65 -5,-68 L -5,-72 C -20,-69 -33,-58 -39,-43 C -45,-28 -43,-11 -34,2 C -25,15 -10,22 5,22 C 20,22 35,15 44,2 C 53,-11 55,-28 49,-43 C 43,-58 31,-69 16,-73 L 16,-82 C 16,-88 12,-92 8,-94 C 4,-96 -0.4,-94 -3,-91 C -5.6,-88 -6,-84 -4,-80 C -2,-76 2,-74 6,-75 C 10,-76 13,-79 13,-83 C 13,-87 10,-90 6,-90 C 2,-90 -1,-87 -2,-84 Z
                 M -30,95 C -30,103 -25,110 -17,113 C -9,116 0,114 6,108 C 12,102 14,93 11,85 C 8,77 0,71 -9,71 C -18,71 -26,77 -29,85 C -32,93 -32,95 -30,95 Z"
              fill="url(#goldGradient)" 
              stroke="#d4af37" 
              stroke-width="2.5"
              stroke-linejoin="round"
              stroke-linecap="round"/>
        
        <!-- Brilhos e destaques -->
        <ellipse cx="0" cy="-50" rx="10" ry="18" fill="#ffed4e" opacity="0.35" transform="rotate(-5 0 -50)"/>
        <circle cx="-15" cy="95" r="6" fill="#ffffff" opacity="0.4"/>
        <ellipse cx="8" cy="-103" rx="4" ry="6" fill="#ffffff" opacity="0.5"/>
    </g>
    
    <!-- Bottom text with golden glow - apenas "L" de Louvor -->
    <g filter="url(#textGlow)">
        <!-- Text outline (stroke) -->
        <text x="256" y="485" text-anchor="middle" fill="none" stroke="url(#goldGradient)" stroke-width="3" font-size="48" font-weight="bold" font-family="Arial, sans-serif">L</text>
        <!-- Text fill -->
        <text x="256" y="485" text-anchor="middle" fill="url(#goldGradient)" font-size="48" font-weight="bold" font-family="Arial, sans-serif">L</text>
    </g>
</svg>