<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradiente Rosa/Vermelho para nota esquerda -->
        <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#F06292;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradiente Azul Claro para notas azuis -->
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Fundo branco -->
    <rect width="512" height="512" fill="#FFFFFF"/>
    
    <!-- NOTA ROSA (esquerda) - Nota musical completa -->
    <g transform="translate(130, 150)">
        <!-- Cabeça da nota (círculo) -->
        <circle cx="0" cy="150" r="50" fill="url(#pinkGradient)"/>
        
        <!-- Haste da nota -->
        <rect x="45" y="0" width="20" height="155" rx="10" fill="url(#pinkGradient)"/>
        
        <!-- Topo curvo da haste -->
        <path d="M 65,0 Q 100,0 110,30 Q 115,50 110,80 Q 105,100 90,105" 
              stroke="url(#pinkGradient)" 
              stroke-width="20" 
              fill="none" 
              stroke-linecap="round"/>
    </g>
    
    <!-- NOTA AZUL PEQUENA (esquerda-baixo) -->
    <g transform="translate(220, 360)">
        <!-- Cabeça da nota (círculo) -->
        <circle cx="0" cy="0" r="45" fill="url(#blueGradient)"/>
        
        <!-- Haste da nota -->
        <rect x="40" y="-110" width="18" height="110" rx="9" fill="url(#blueGradient)"/>
    </g>
    
    <!-- NOTA AZUL GRANDE (direita) - Estilo quadrado/retangular -->
    <g transform="translate(340, 180)">
        <!-- Parte superior retangular inclinada -->
        <path d="M 0,0 L 140,40 L 140,120 L 80,140 L 0,110 Z" 
              fill="url(#blueGradient)"
              opacity="0.95"/>
        
        <!-- Recorte interno (branco) -->
        <path d="M 30,35 L 110,60 L 110,100 L 80,110 L 30,90 Z" 
              fill="#FFFFFF"/>
        
        <!-- Cabeça da nota (círculo grande) -->
        <circle cx="110" cy="230" r="55" fill="url(#blueGradient)"/>
        
        <!-- Haste conectando -->
        <rect x="80" y="140" width="18" height="95" rx="9" fill="url(#blueGradient)"/>
    </g>
</svg>
