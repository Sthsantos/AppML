services:
  # Web Service - Aplicação Flask
  - type: web
    name: ministry-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ministry-db
          property: connectionString

# PostgreSQL Database
databases:
  - name: ministry-db
    plan: free
    databaseName: ministry
    user: ministry_user
