services:
  # Web Service - Aplicação Flask
  - type: web
    name: ministry-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      # IMPORTANTE: Adicione SECRET_KEY manualmente no Dashboard do Render
      # para evitar logout após deploys. Veja CONFIGURAR_SECRET_KEY.md
      # Gerar chave: python -c "import secrets; print(secrets.token_hex(32))"
      - key: DATABASE_URL
        fromDatabase:
          name: ministry-db
          property: connectionString
      # Push Notifications - VAPID Keys
      - key: VAPID_PUBLIC_KEY
        value: BIE96TdoPCTzTEV2CzZnopybGg9fXG2bo_uZt0nFY0KKi42e-zgneIS4R89Hw_oEQCaoCm0PaV_PkSAbduNLs50
      - key: VAPID_PRIVATE_KEY
        value: "-----BEGIN PRIVATE KEY-----\nMIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgzRp0oAPfjQBk6DOk\nPVOISDaEt6GEZebmFvTEtVB+PzuhRANCAASBPek3aDwk80xFdgs2Z6KcmxoPX1xt\nm6P7mbdJxWNCiouNnvs4J3iEuEfPR8P6BEAmqAptD2lfz5EgG3bjS7Od\n-----END PRIVATE KEY-----"
      - key: VAPID_CLAIMS_EMAIL
        value: mailto:admin@ministry.com

# PostgreSQL Database
databases:
  - name: ministry-db
    plan: free
    databaseName: ministry
    user: ministry_user
